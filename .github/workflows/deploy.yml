name: Deploy to Tomcat

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Build WAR
        run: mvn clean package
      
      - name: Deploy to Tomcat
        run: |
          curl -v --user tomcat:s3cret \
          --upload-file target/*.war \
          "http://13.213.64.1:8080/manager/text/deploy?path=/TrainProject&update=true"