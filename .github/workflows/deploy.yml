name: Deploy to All Environments

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Build WAR
        run: mvn clean package
      - name: Upload WAR
        uses: actions/upload-artifact@v4
        with:
          name: myapp
          path: target/*.war

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: myapp
      - name: Deploy to Dev
        run: curl -u tomcat:s3cret --upload-file *.war "http://13.213.64.1:8080/manager/text/deploy?path=/TrainProject&update=true"

  deploy-test:
    needs: deploy-dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: myapp
      - name: Deploy to Test
        run: curl -u tomcat:s3cret --upload-file *.war "http://3.1.202.178:8080/manager/text/deploy?path=/TrainProject&update=true"

  deploy-preprod:
    needs: deploy-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: myapp
      - name: Deploy to Pre-Prod
        run: curl -u tomcat:s3cret --upload-file *.war "http://13.212.7.3:8080/manager/text/deploy?path=/TrainProject&update=true"

  deploy-prod:
    needs: deploy-preprod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: myapp
      - name: Deploy to Prod
        run: curl -u tomcat:s3cret --upload-file *.war "http://13.212.228.214:8080/manager/text/deploy?path=/TrainProject&update=true"